version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/animaitus-worker
      - IMAGE_TAG=$(echo $CODEBUILD_WEBHOOK_TRIGGER | cut -d'/' -f2)
  build:
    commands:
      - echo Build started on `date`

      # 1. Build the "Generic" Base Image from the root Dockerfile
      - echo Building the generic base image...
      - docker build -t base-image -f Dockerfile .

      # 2. Build the EKS-specific image using the base-image we just made
      - echo Building the EKS-specific image...
      - docker build -t $REPOSITORY_URI:latest --build-arg BASE_IMAGE_NAME=base-image -f eks/Dockerfile .

      # 3. Tag it with the Git Tag (or 'manual')
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Pushing main image...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      
      - echo Generating SOCI index using Registry Mode...
      # We use the official AWS generator image (Correct URI: public.ecr.aws/soci-index-generator/soci-index-generator)
      # We pass in your AWS credentials so it can talk to your ECR repo
      - |
        docker run --rm \
          -e AWS_REGION=$AWS_REGION \
          -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
          -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
          -e AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN \
          public.ecr.aws/soci-index-generator/soci-index-generator:latest \
          $REPOSITORY_URI:$IMAGE_TAG