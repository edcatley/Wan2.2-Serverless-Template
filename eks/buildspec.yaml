version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/animaitus-worker
      - IMAGE_TAG=$(echo $CODEBUILD_WEBHOOK_TRIGGER | cut -d'/' -f2)
  build:
    commands:
      - echo Build started on `date`

      # 1. Build the "Generic" Base Image from the root Dockerfile
      - echo Building the generic base image...
      - docker build -t base-image -f Dockerfile .

      # 2. Build the EKS-specific image using the base-image we just made
      - echo Building the EKS-specific image...
      - docker build -t $REPOSITORY_URI:latest --build-arg BASE_IMAGE_NAME=base-image -f eks/Dockerfile .

      # 3. Tag it with the Git Tag (or 'manual')
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Pushing main image...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      
      - echo Installing latest SOCI CLI...
      # Use the GitHub API + jq to find the latest linux-amd64 download URL automatically
      - export SOCI_URL=$(curl -s https://api.github.com/repos/awslabs/soci-snapshotter/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64.tar.gz")) | .browser_download_url')
      - curl -L -o soci.tar.gz $SOCI_URL
      - tar -xvzf soci.tar.gz
      # The binary inside the tarball is named 'soci'
      - cp soci /usr/local/bin/
      
      - echo Generating SOCI index for 25GB image...
      # This scans the local docker image we just built
      - soci create $REPOSITORY_URI:$IMAGE_TAG
      
      - echo Pushing SOCI index to ECR...
      - soci push $REPOSITORY_URI:$IMAGE_TAG