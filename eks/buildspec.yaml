version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/animaitus-worker
      - IMAGE_TAG=$(echo $CODEBUILD_WEBHOOK_TRIGGER | cut -d'/' -f2)
  build:
    commands:
      - echo Build started from root context...
      # We stay in the root, but tell docker to use the EKS-specific Dockerfile
      - docker build -t $REPOSITORY_URI:latest -f eks/Dockerfile .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Pushing...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG