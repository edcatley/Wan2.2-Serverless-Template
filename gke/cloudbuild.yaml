steps:
  # ==========================================================
  # 0. DETECT WHAT CHANGED
  # ==========================================================
  - name: 'gcr.io/cloud-builders/git'
    id: detect-changes
    entrypoint: bash
    args:
      - -c
      - |
        git fetch --tags
        PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
        if [ -z "$PREV_TAG" ]; then
          echo "No previous tag found - building base"
          echo "BUILD_BASE=true" > /workspace/build_flags
        else
          BASE_CHANGED=$(git diff --name-only $PREV_TAG HEAD -- base/ | wc -l)
          if [ "$BASE_CHANGED" -gt 0 ]; then
            echo "Changes detected in base/ - building base"
            echo "BUILD_BASE=true" > /workspace/build_flags
          else
            echo "No changes in base/ - skipping base build"
            echo "BUILD_BASE=false" > /workspace/build_flags
          fi
        fi
        cat /workspace/build_flags

  # ==========================================================
  # 1. BUILD BASE IMAGE (conditional)
  # ==========================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: build-base
    waitFor: ['detect-changes']
    entrypoint: bash
    args:
      - -c
      - |
        source /workspace/build_flags
        if [ "$BUILD_BASE" = "true" ]; then
          docker build \
            --tag ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:base-latest \
            --tag ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:base-$SHORT_SHA \
            --cache-from ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:base-latest \
            --file base/Dockerfile ./base
        else
          echo "Skipping base build"
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: push-base
    waitFor: ['build-base']
    entrypoint: bash
    args:
      - -c
      - |
        source /workspace/build_flags
        if [ "$BUILD_BASE" = "true" ]; then
          docker push --all-tags ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui
        else
          echo "Skipping base push"
        fi

  # ==========================================================
  # 2. BUILD GKE ADAPTER
  # ==========================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: build-gke
    waitFor: ['push-base']
    args:
      - build
      - --tag
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:gke-latest'
      - --tag
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:gke-$SHORT_SHA'
      - --cache-from
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:gke-latest'
      - --build-arg
      - 'BASE_IMAGE_NAME=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:base-latest'
      - --file
      - gke/Dockerfile
      - ./gke

  - name: 'gcr.io/cloud-builders/docker'
    id: push-gke
    waitFor: ['build-gke']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui'

substitutions:
  _PROJECT_ID: project-lovegood
  _REGION: europe-west1
  _REPO: comfyui-gke

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '7200s'
