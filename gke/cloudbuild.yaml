steps:
  # ==========================================================
  # 1. BUILD BASE IMAGE
  # ==========================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: build-base
    args:
      - build
      - --tag
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:base-latest'
      - --tag
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:base-$SHORT_SHA'
      - --cache-from
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:base-latest'
      - --file
      - base/Dockerfile
      - ./base

  - name: 'gcr.io/cloud-builders/docker'
    id: push-base
    waitFor: ['build-base']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui'

  # ==========================================================
  # 2. BUILD GKE ADAPTER
  # ==========================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: build-gke
    waitFor: ['push-base']
    args:
      - build
      - --tag
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:gke-latest'
      - --tag
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:gke-$SHORT_SHA'
      - --cache-from
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:gke-latest'
      - --build-arg
      - 'BASE_IMAGE_NAME=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui:base-latest'
      - --file
      - gke/Dockerfile
      - ./gke

  - name: 'gcr.io/cloud-builders/docker'
    id: push-gke
    waitFor: ['build-gke']
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/wan2-comfyui'

substitutions:
  _PROJECT_ID: animaitus
  _REGION: europe-west4
  _REPO: animaitus-repo

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '7200s'
